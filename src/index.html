<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ResultMaster Dashboard</title>
    <link rel="stylesheet" href="styles/theme.css" />
  </head>
  <body>
    <main class="app-shell" aria-labelledby="dashboard-title">
      <header class="top-bar">
        <div>
          <p class="eyebrow">ResultMaster</p>
          <h1 id="dashboard-title">Dashboard</h1>
        </div>
        <span class="save-status" aria-label="Offline ready">Offline ready</span>
      </header>

      <section class="dashboard-grid" aria-label="Primary actions">
        <button class="action-card" type="button">
          <span class="card-title">New Result</span>
          <span class="card-description">Create a new local result workbook.</span>
        </button>
        <button class="action-card" type="button">
          <span class="card-title">Open Result</span>
          <span class="card-description">Continue an existing workbook.</span>
        </button>
        <button class="action-card" type="button">
          <span class="card-title">Class Registers</span>
          <span class="card-description">Manage classes and student lists.</span>
        </button>
        <button class="action-card" type="button">
          <span class="card-title">Templates</span>
          <span class="card-description">Reuse subject and component setups.</span>
        </button>
        <button class="action-card" type="button">
          <span class="card-title">Backup</span>
          <span class="card-description">Protect local result data.</span>
        </button>
        <button class="action-card" type="button">
          <span class="card-title">Settings</span>
          <span class="card-description">Configure workbook preferences.</span>
        </button>
      </section>
    </main>
  </body>
</html>
