<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ResultMaster Workbook</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="workbook">
    <header class="toolbar">
      <h1>ResultMaster</h1>
      <input id="search" type="search" placeholder="Search Roll Number or Student Name">
      <button id="insertStudent">Insert Student</button>
      <span id="status" role="status"></span>
    </header>
    <nav id="tabs" class="tabs" aria-label="Workbook sheets"></nav>
    <section id="sheet" class="sheet"></section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
