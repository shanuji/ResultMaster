<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ResultMaster Workbook</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="workbook">
    <header class="toolbar">
      <h1>ResultMaster</h1>
      <input id="search" type="search" placeholder="Search Roll Number or Student Name">
      <select id="studentSelect" aria-label="Student for individual printing"></select>
      <button id="printClass">Class Print Preview</button>
      <button id="printStudent">Student Print Preview</button>
      <button id="exportPdf">Export PDF</button>
      <button id="exportExcel">Export Excel</button>
      <span id="status" role="status"></span>
    </header>
    <section id="settings" class="settings"></section>
    <section id="sheet" class="sheet"></section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
