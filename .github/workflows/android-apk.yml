name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - 'lib/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'scripts/build_android_artifact.sh'
      - '.github/workflows/android-apk.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'android/**'
      - 'lib/**'
      - 'assets/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'scripts/build_android_artifact.sh'
      - '.github/workflows/android-apk.yml'

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      RESULTMASTER_KEYSTORE: ${{ secrets.RESULTMASTER_KEYSTORE }}
      RESULTMASTER_KEYSTORE_PASSWORD: ${{ secrets.RESULTMASTER_KEYSTORE_PASSWORD }}
      RESULTMASTER_KEY_ALIAS: ${{ secrets.RESULTMASTER_KEY_ALIAS }}
      RESULTMASTER_KEY_PASSWORD: ${{ secrets.RESULTMASTER_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter sources
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Build Android APK
        run: scripts/build_android_artifact.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: resultmaster-android-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 14
