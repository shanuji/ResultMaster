<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ResultMaster</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header"><h1>ResultMaster</h1><span>Offline School Result Management App</span></header>
  <nav class="tabs"><button class="tab active" data-tab="marks">Marks</button><button class="tab" data-tab="summary">Summary</button><button class="tab" data-tab="final">Final</button><button class="tab" data-tab="settings">Settings</button></nav>
  <main>
    <section id="marks" class="panel active"><div class="toolbar"><strong>Subject marks</strong><span id="save-state">Autosaved</span></div><div class="sheet-wrap"><table id="marks-table" class="sheet"></table></div></section>
    <section id="summary" class="panel"><div class="toolbar"><input id="search" placeholder="Search Roll Number or Student Name"><select id="sort"><option value="roll_no">Sort: Roll Number</option><option value="student_name">Sort: Student Name</option><option value="grand_total">Sort: Grand Total</option><option value="rank">Sort: Rank</option><option value="percentage">Sort: Percentage</option></select><a class="button" href="/api/export/summary.xlsx">Export Summary (.xlsx)</a></div><div class="sheet-wrap"><table id="summary-table" class="sheet"></table></div></section>
    <section id="final" class="panel"><div class="toolbar"><strong>Final Sheet</strong><span>Dynamic subject columns with totals and pass/fail status.</span></div><div class="sheet-wrap"><table id="final-table" class="sheet"></table></div></section>
    <section id="settings" class="panel"><div class="settings-grid"><label>Pass Marks<input id="pass-marks" type="number" min="0" step="0.01"></label><label>Max Marks per Subject<input id="max-marks" type="number" min="1" step="0.01"></label></div><h2>Remark Rules</h2><p>Enter minimum percentage thresholds. Calculations autosave immediately.</p><div id="remark-rules"></div></section>
  </main>
  <script src="app.js"></script>
</body>
</html>
