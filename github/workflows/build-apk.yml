name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually click "Build Now" anytime!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v3

      - name: Set up Java Environment
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Uses a rock-solid stable Flutter version
          channel: 'stable'

      - name: Download App Dependencies
        run: flutter pub get

      - name: Build Test APK (Debug version for easy testing)
        run: flutter build apk --debug

      - name: Upload APK so you can download it!
        uses: actions/upload-artifact@v3
        with:
          name: ResultMaster-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
          
