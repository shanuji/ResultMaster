plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'dev.flutter.flutter-gradle-plugin'
}

android {
    namespace 'com.resultmaster.app'
    compileSdk 35

    defaultConfig {
        applicationId 'com.resultmaster.app'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '0.1.0'
    }
}

flutter { source '../..' }
